name: Bug Report
about: Report a bug in BlackRoad OS
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to...
        2. Run...
        3. See error...
  - type: dropdown
    id: node
    attributes:
      label: Affected Node
      options:
        - Alice (.49 — Gateway)
        - Cecilia (.96 — Edge AI)
        - Octavia (.101 — Gitea/Swarm)
        - Aria (.98 — Orchestration)
        - Lucidia (.38 — Memory)
        - Cloudflare Worker
        - Mac (Alexandria)
        - All Nodes
        - N/A
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (service down)
        - High (major feature broken)
        - Medium (degraded performance)
        - Low (cosmetic/minor)
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error output or logs
      render: shell
